---
- name: Create floating IP
  when: item.servers[0].access_ipv4 | length == 0
  ansible.builtin.command:
    cmd: >
      openstack floating ip create {{ os_default_network_name }} -f json
  register: floating_ip_response
  changed_when: true

- name: Attach floating IP to instance
  when: item.servers[0].access_ipv4 | length == 0
  ansible.builtin.command:
    cmd: >
      openstack server add floating ip {{ item.servers[0].id }} {{ (floating_ip_response.stdout | from_json).id  }}
  changed_when: true