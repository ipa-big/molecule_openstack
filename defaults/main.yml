---
## Molecule
molecule_ephemeral_id: "{{ (lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') | basename).split('.')[1] }}"

## SSH:
default_ssh_port: 22
default_ssh_username:
  CentOS 7 64-bit: centos
  CentOS 8 64-bit: centos
  CentOS 9 Stream 64-bit: cloud-user
  CentOS 10 Stream 64-bit: cloud-user
  Ubuntu 18.04 64-bit: ubuntu
  Ubuntu 20.04 64-bit: ubuntu
  Ubuntu 22.04 64-bit: ubuntu
  Ubuntu 24.04 64-bit: ubuntu
  Debian 11 64-bit: debian
  Debian 12 64-bit: debian
  Debian 13 64-bit: debian
default_initial_ssh_wait_timeout: 30
default_ssh_wait_timeout: 180

## OPENSTACK:
os_auth:
  domain_name: "{{ lookup('env', 'OS_DOMAIN_NAME') | default('ansible-dev', true) }}"
  project_name: "{{ lookup('env', 'OS_PROJECT_NAME') | default('admin', true) }}"
os_username: "{{ lookup('env', 'OS_USERNAME') }}"
os_default_prefix: "ansible-dev-molecule-{{ os_username | split('@') | first | replace('.', '-') }}{{ galaxy_info | default('') }}-"
os_default_flavor_name: m1.medium
os_default_network_name: private

os_default_router_name: "molecule-test-router"
os_default_int_network_name: "molecule-test-network"
os_default_int_subnet_name: "molecule-test-subnet"
os_default_int_subnet_cidr: "192.168.10.0/24"

os_key_pair_suffix: "molecule-test-"

os_security_group_name: ansible-dev-molecule
os_security_group_description: "Security group for testing Molecule"
os_security_group_rules:
  - proto: tcp
    port_min: "{{ ssh_port | default(default_ssh_port) }}"
    port_max: "{{ ssh_port | default(default_ssh_port) }}"
    cidr: '0.0.0.0/0'
  - proto: icmp
    port_min: -1
    port_max: -1
    cidr: '0.0.0.0/0'
  - proto: any
    ethertype: IPv4
    group: "{{ security_group.security_group.id }}"
  - ethertype: IPv6
    group: "{{ security_group.security_group.id }}"

## LOCAL:
local_key_pair_path: "~/.ssh/"
local_key_pair_file: "molecule_ssh_key"

