---
dependency:
  name: galaxy
driver:
  name: default
platforms:
  - name: centos7
    image_name: CentOS 7 64-bit (Ansible)
  - name: centos8
    image_name: CentOS 8 64-bit (Ansible)
  - name: centos9
    image_name: CentOS 9 Stream 64-bit
  - name: centos10
    image_name: CentOS 10 Stream 64-bit

  - name: debian11
    image_name: Debian 11 64-bit (Ansible)
  - name: debian12
    image_name: Debian 12 64-bit
  - name: debian13
    image_name: Debian 13 64-bit

  - name: ubuntu1804
    image_name: Ubuntu 18.04 64-bit (Ansible)
  - name: ubuntu2004
    image_name: Ubuntu 20.04 64-bit (Ansible)
  - name: ubuntu2204
    image_name: Ubuntu 22.04 64-bit
  - name: ubuntu2404
    image_name: Ubuntu 24.04 64-bit

provisioner:
  name: ansible
  playbooks:
    prepare: ../default/prepare.yml
    converge: ../default/converge.yml
    verify: ../default/verify.yml
    destroy: ../default/destroy.yml
verifier:
  name: ansible
