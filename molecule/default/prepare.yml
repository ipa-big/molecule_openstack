---
- name: Prepare
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Ensure Molecule roles directory exists
      ansible.builtin.file:
        path: "{{ playbook_dir }}/roles"
        state: directory
        mode: "0755"

    - name: Link molecule_openstack role for Molecule
      ansible.builtin.file:
        src: "{{ playbook_dir }}/../../"
        dest: "{{ playbook_dir }}/roles/molecule_openstack"
        state: link
        force: true
