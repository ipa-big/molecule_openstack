---
dependency:
  name: galaxy
driver:
  name: default
platforms:
  - name: ubuntu1804
    image_name: Ubuntu 18.04 64-bit
  - name: ubuntu2004
    image_name: Ubuntu 20.04 64-bit
  - name: ubuntu2204
    image_name: Ubuntu 22.04 64-bit
  - name: ubuntu2404
    image_name: Ubuntu 24.04 64-bit
provisioner:
  name: ansible
  playbooks:
    prepare: ../default/prepare.yml
    converge: ../default/converge.yml
    verify: ../default/verify.yml
    destroy: ../default/destroy.yml
verifier:
  name: ansible
